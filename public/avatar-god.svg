<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="60%" stop-color="#F5E6B8"/>
      <stop offset="100%" stop-color="#C8A23D"/>
    </radialGradient>
    <radialGradient id="face" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#FDE8D0"/>
      <stop offset="100%" stop-color="#E8C9A0"/>
    </radialGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFE082" stop-opacity="0.9"/>
      <stop offset="70%" stop-color="#C8A23D" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#C8A23D" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <circle cx="100" cy="100" r="100" fill="url(#glow)"/>
  <!-- Halo rays -->
  <circle cx="100" cy="85" r="55" fill="url(#halo)"/>
  <!-- Hair/beard area -->
  <ellipse cx="100" cy="75" rx="32" ry="34" fill="#E0D5C0"/>
  <!-- Face -->
  <ellipse cx="100" cy="72" rx="26" ry="28" fill="url(#face)"/>
  <!-- Eyes - gentle, wise -->
  <ellipse cx="90" cy="68" rx="3" ry="2" fill="#5D4E37"/>
  <ellipse cx="110" cy="68" rx="3" ry="2" fill="#5D4E37"/>
  <!-- Gentle smile -->
  <path d="M 91 78 Q 100 84 109 78" fill="none" stroke="#8B7355" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Beard -->
  <path d="M 78 80 Q 80 110 100 118 Q 120 110 122 80" fill="#D4C9B4" opacity="0.8"/>
  <!-- Hair flowing -->
  <path d="M 68 70 Q 65 50 75 42 Q 90 35 100 38 Q 110 35 125 42 Q 135 50 132 70" fill="#D4C9B4" opacity="0.7"/>
  <!-- Shoulders/robe -->
  <path d="M 55 130 Q 60 105 80 98 Q 100 93 120 98 Q 140 105 145 130 Q 145 160 100 160 Q 55 160 55 130" fill="#F5ECD7"/>
  <!-- Robe detail -->
  <path d="M 100 98 L 100 150" stroke="#DDD0B5" stroke-width="1" opacity="0.6"/>
  <!-- Light rays from behind -->
  <g opacity="0.15" stroke="#C8A23D" stroke-width="2">
    <line x1="100" y1="20" x2="100" y2="5"/>
    <line x1="130" y1="28" x2="140" y2="15"/>
    <line x1="70" y1="28" x2="60" y2="15"/>
    <line x1="150" y1="50" x2="163" y2="42"/>
    <line x1="50" y1="50" x2="37" y2="42"/>
  </g>
</svg>
