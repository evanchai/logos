<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="bg-b" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F0EDE0"/>
      <stop offset="100%" stop-color="#D4CDB0"/>
    </radialGradient>
    <radialGradient id="face-b" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#F5DEB3"/>
      <stop offset="100%" stop-color="#DEB887"/>
    </radialGradient>
    <radialGradient id="halo-b" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#B8860B" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#B8860B" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <circle cx="100" cy="100" r="100" fill="url(#bg-b)"/>
  <!-- Halo -->
  <circle cx="100" cy="80" r="60" fill="url(#halo-b)"/>
  <!-- Lotus base -->
  <g opacity="0.3">
    <ellipse cx="100" cy="170" rx="50" ry="12" fill="#7B8C56"/>
    <path d="M 60 170 Q 65 155 80 158 Q 90 160 100 152 Q 110 160 120 158 Q 135 155 140 170" fill="#8FA362" opacity="0.6"/>
    <path d="M 50 172 Q 55 162 70 164 Q 85 166 100 156 Q 115 166 130 164 Q 145 162 150 172" fill="#7B8C56" opacity="0.4"/>
  </g>
  <!-- Robe/body -->
  <path d="M 58 140 Q 62 115 80 108 Q 100 100 120 108 Q 138 115 142 140 Q 142 168 100 170 Q 58 168 58 140" fill="#B8860B" opacity="0.25"/>
  <path d="M 65 135 Q 68 115 82 110 Q 100 104 118 110 Q 132 115 135 135 Q 135 162 100 164 Q 65 162 65 135" fill="#D4A843" opacity="0.2"/>
  <!-- Face -->
  <ellipse cx="100" cy="72" rx="28" ry="30" fill="url(#face-b)"/>
  <!-- Hair bumps (ushnisha) -->
  <circle cx="100" cy="40" r="14" fill="#4A4A3A"/>
  <path d="M 72 65 Q 72 42 85 38 Q 100 32 115 38 Q 128 42 128 65" fill="#4A4A3A"/>
  <!-- Eyes - half closed, meditative -->
  <path d="M 86 70 Q 90 67 94 70" fill="none" stroke="#4A3A2A" stroke-width="1.8" stroke-linecap="round"/>
  <path d="M 106 70 Q 110 67 114 70" fill="none" stroke="#4A3A2A" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Gentle serene smile -->
  <path d="M 90 80 Q 100 86 110 80" fill="none" stroke="#7A6A50" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Dot (urna) -->
  <circle cx="100" cy="62" r="2" fill="#B8860B"/>
  <!-- Earlobes -->
  <path d="M 72 72 Q 68 80 70 90" fill="none" stroke="#D4A860" stroke-width="2" stroke-linecap="round"/>
  <path d="M 128 72 Q 132 80 130 90" fill="none" stroke="#D4A860" stroke-width="2" stroke-linecap="round"/>
  <!-- Robe drape line -->
  <path d="M 80 110 Q 100 102 120 110" fill="none" stroke="#B8860B" stroke-width="1" opacity="0.3"/>
</svg>
