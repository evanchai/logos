<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="bg-a" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E8F4F0"/>
      <stop offset="100%" stop-color="#1A6B5A"/>
    </radialGradient>
    <radialGradient id="inner-a" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2E8B7A" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#1A6B5A" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <circle cx="100" cy="100" r="100" fill="url(#bg-a)"/>
  <!-- Outer decorative ring -->
  <circle cx="100" cy="100" r="90" fill="none" stroke="#B8D4CC" stroke-width="1" opacity="0.5"/>
  <circle cx="100" cy="100" r="85" fill="none" stroke="#B8D4CC" stroke-width="0.5" opacity="0.3"/>
  <!-- Islamic geometric star pattern (8-pointed) -->
  <g transform="translate(100,100)" opacity="0.15" stroke="#1A6B5A" stroke-width="0.8" fill="none">
    <!-- Outer octagram -->
    <polygon points="0,-70 20,-20 70,0 20,20 0,70 -20,20 -70,0 -20,-20"/>
    <rect x="-50" y="-50" width="100" height="100" transform="rotate(45)"/>
    <!-- Inner octagram -->
    <polygon points="0,-45 13,-13 45,0 13,13 0,45 -13,13 -45,0 -13,-13"/>
    <rect x="-32" y="-32" width="64" height="64" transform="rotate(45)"/>
  </g>
  <!-- Central circle glow -->
  <circle cx="100" cy="100" r="38" fill="url(#inner-a)"/>
  <circle cx="100" cy="100" r="38" fill="none" stroke="#1A6B5A" stroke-width="1" opacity="0.2"/>
  <!-- Arabic calligraphy: Allah (الله) stylized -->
  <g transform="translate(100,100)" fill="#1A6B5A">
    <!-- Stylized "Allah" in Arabic calligraphy -->
    <!-- Alif-Lam -->
    <path d="M -18 15 L -18 -20 Q -18 -25 -14 -25 Q -10 -25 -10 -20 L -10 0" stroke="#1A6B5A" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <!-- Lam -->
    <path d="M -6 15 L -6 -12 Q -6 -17 -2 -17 Q 2 -17 2 -12 L 2 5" stroke="#1A6B5A" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <!-- Ha -->
    <path d="M 6 5 Q 6 -5 14 -5 Q 22 -5 22 5 Q 22 15 14 15 Q 6 15 6 5 Z" stroke="#1A6B5A" stroke-width="2.5" fill="none"/>
    <!-- Baseline -->
    <line x1="-22" y1="15" x2="26" y2="15" stroke="#1A6B5A" stroke-width="2" stroke-linecap="round"/>
    <!-- Shadda (diacritic) -->
    <path d="M -16 -28 Q -14 -32 -12 -28" stroke="#1A6B5A" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  </g>
  <!-- Corner decorative elements -->
  <g opacity="0.1" fill="#1A6B5A">
    <circle cx="100" cy="18" r="3"/>
    <circle cx="100" cy="182" r="3"/>
    <circle cx="18" cy="100" r="3"/>
    <circle cx="182" cy="100" r="3"/>
    <!-- Diagonal dots -->
    <circle cx="42" cy="42" r="2"/>
    <circle cx="158" cy="42" r="2"/>
    <circle cx="42" cy="158" r="2"/>
    <circle cx="158" cy="158" r="2"/>
  </g>
  <!-- Crescent and star (small, decorative at top) -->
  <g transform="translate(100, 30)" opacity="0.25" fill="#1A6B5A">
    <path d="M 0,-8 Q 8,-8 8,0 Q 8,8 0,8 Q 4,5 4,0 Q 4,-5 0,-8 Z"/>
    <polygon points="12,0 13,-2 14,0 13,2" transform="scale(0.6)"/>
  </g>
</svg>
